<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Sussurro Perdido</title>
    <link rel="icon" type="image/png" href="yihbranco.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #9d4edd;
            --dark: #0a0a0a;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background-color: var(--dark); 
            color: var(--text); 
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh;
            background: radial-gradient(circle at 50% 50%, #240046 0%, #0a0a0a 70%);
            z-index: -1;
        }

        .logo { margin-bottom: 50px; }
        .logo img { height: 60px; width: auto; opacity: 0.8; }

        .error-container { text-align: center; padding: 20px; }
        
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            color: var(--primary);
            text-shadow: 0 0 30px rgba(157, 78, 221, 0.4);
            margin-bottom: 10px;
        }

        h1 { font-size: 2rem; margin-bottom: 20px; }
        p { color: #aaa; font-size: 1.1rem; margin-bottom: 40px; max-width: 450px; }

        .btn-back {
            background: rgba(157, 78, 221, 0.1);
            color: var(--primary);
            padding: 15px 40px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            border: 1px solid var(--primary);
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-back:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(157, 78, 221, 0.2);
        }

        .ghost-icon {
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
            color: var(--primary);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <div class="logo">
        <img src="yihbranco.png" alt="Yih Logo">
    </div>

    <div class="error-container">
        <div class="ghost-icon">
            <i data-lucide="ghost" size="80"></i>
        </div>
        <div class="error-code">404</div>
        <h1>Sussurro não encontrado.</h1>
        <p>O que você estava procurando desapareceu no ar ou nunca existiu. Algumas coisas devem permanecer em segredo.</p>
        
        <a href="index.html" class="btn-back">
            <i data-lucide="arrow-left" size="20"></i>
            Voltar para o início
        </a>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
