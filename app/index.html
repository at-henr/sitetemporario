<!DOCTYPE html>
<html>
<head>
  <base href="/app/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Yih - Sussurros Invisíveis">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Yih">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="yihbranco.png">

  <title>Yih | Entrando...</title>
  <link rel="manifest" href="manifest.json">

  <script id="aclib" type="text/javascript" src="//acscdn.com/script/aclib.js"></script>

  <script src="assets/packages/zego_express_engine/assets/zego-express-flutter-webrtc.js"></script>
  <style>
    body {
      background-color: #0a0a0a;
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
    }
    .loader-container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .loader-logo {
      height: 80px;
      width: auto;
      margin-bottom: 20px;
      animation: pulse 2s infinite ease-in-out;
    }
    .progress-bar {
      width: 150px;
      height: 3px;
      background-color: #1a1a1a;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }
    .progress-fill {
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, #9d4edd, transparent);
      position: absolute;
      animation: loading 1.5s infinite linear;
    }
    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0.5; }
      50% { transform: scale(1); opacity: 1; filter: drop-shadow(0 0 15px #9d4edd); }
      100% { transform: scale(0.95); opacity: 0.5; }
    }
    @keyframes loading {
      0% { left: -100%; }
      100% { left: 100%; }
    }
    .loading-text {
      color: #333;
      font-family: 'Poppins', sans-serif;
      font-size: 10px;
      letter-spacing: 2px;
      margin-top: 15px;
      text-transform: uppercase;
    }
  </style>

  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #09090B;
      background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>

<body>
<picture id="splash">
  <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
  <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
  <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
</picture>

<script src="flutter_bootstrap.js" async=""></script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('firebase-messaging-sw.js');
    });
  }
</script>
</body>
</html>
