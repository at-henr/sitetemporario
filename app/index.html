<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base href="/app/">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">

  <!-- 🔥 SEO BÁSICO -->
  <title>Yih Chat - Melhor Chat Anônimo Online | Sussurros Invisíveis</title>

  <meta name="description" content="Yih Chat é um dos melhores chats anônimos online para conversar, fazer novas conexões e trocar mensagens privadas com segurança. Plataforma moderna, rápida e segura.">

  <meta name="keywords" content="chat online, chat anônimo, melhor chat, chat grátis, chat privado, conversar online, bate papo, chat seguro, yih chat">

  <meta name="author" content="Yih App">

  <!-- 🔥 SOCIAL / GOOGLE -->
  <meta property="og:title" content="Yih Chat - Melhor Chat Anônimo Online">
  <meta property="og:description" content="Entre agora no melhor chat anônimo e converse com pessoas em tempo real.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="../yihbranco.png">

  <!-- 🔥 MOBILE -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Yih Chat">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="../yihbranco.png"/>

  <link rel="manifest" href="manifest.json">

  <!-- 🔥 SEO EXTRA (leve, sem spam) -->
  <meta name="robots" content="index, follow">

  <style>
    body {
      background-color: #0a0a0a;
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
    }
    .loader-container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .loader-logo {
      height: 80px;
      width: auto;
      margin-bottom: 20px;
      animation: pulse 2s infinite ease-in-out;
    }
    .progress-bar {
      width: 150px;
      height: 3px;
      background-color: #1a1a1a;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }
    .progress-fill {
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, #9d4edd, transparent);
      position: absolute;
      animation: loading 1.5s infinite linear;
    }
    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0.5; }
      50% { transform: scale(1); opacity: 1; filter: drop-shadow(0 0 15px #9d4edd); }
      100% { transform: scale(0.95); opacity: 0.5; }
    }
    @keyframes loading {
      0% { left: -100%; }
      100% { left: 100%; }
    }
    .loading-text {
      color: #333;
      font-family: 'Poppins', sans-serif;
      font-size: 10px;
      letter-spacing: 2px;
      margin-top: 15px;
      text-transform: uppercase;
    }
  </style>

  <!-- 🔥 BLOQUEIO DE NOTIFICAÇÕES (HOTFIX SEM BUILD) -->
  <script>
    (function () {
      try {
        if ("Notification" in window) {
          console.log("🔕 Notificações desativadas (modo seguro)");

          Notification.requestPermission = function (callback) {
            console.warn("🚫 Permissão de notificação bloqueada");

            const result = Promise.resolve("denied");

            if (callback) result.then(callback);

            return result;
          };
        }

        if ('serviceWorker' in navigator) {
          const originalRegister = navigator.serviceWorker.register;

          navigator.serviceWorker.register = function () {
            console.warn("🚫 Service Worker Firebase bloqueado");
            return Promise.resolve({
              installing: null,
              waiting: null,
              active: null
            });
          };
        }
      } catch (e) {
        console.error("Erro ao aplicar bloqueio:", e);
      }
    })();
  </script>

</head>

<body>
  <div class="loader-container">
    <img src="../yihbranco.png" alt="Yih Chat Logo" class="loader-logo">
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
    <div class="loading-text">Buya Digitais</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
